name: arizanet

services:
  arizanet-db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: arizanet-db
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_PID: "Developer"
      MSSQL_SA_PASSWORD: ${DB_PASSWORD}
    ports:
      - "${DB_PORT}:1433"
    volumes:
      - arizanet_db_data:/var/opt/mssql
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "$$MSSQL_SA_PASSWORD" -C -Q "SELECT 1" || exit 1
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  db-init:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: arizanet-db-init
    depends_on:
      arizanet-db:
        condition: service_healthy
    environment:
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
    command: >
      bash -c "/opt/mssql-tools18/bin/sqlcmd
      -S arizanet-db
      -U sa
      -P \"$${DB_PASSWORD}\"
      -C
      -Q \"IF DB_ID('$${DB_NAME}') IS NULL CREATE DATABASE [$${DB_NAME}];\""

  auth-service:
    build:
      context: ./backend/auth-service
      dockerfile: Dockerfile
    container_name: arizanet-auth-service
    depends_on:
      db-init:
        condition: service_completed_successfully
    restart: on-failure
    environment:
      AUTH_DB_HOST: arizanet-db
      AUTH_DB_PORT: 1433
      AUTH_DB_NAME: ${DB_NAME}
      AUTH_DB_USERNAME: ${DB_USERNAME}
      AUTH_DB_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
    ports:
      - "${AUTH_SERVICE_PORT}:8081"

  fault-service:
    build:
      context: ./backend/fault-service
      dockerfile: Dockerfile
    container_name: arizanet-fault-service
    depends_on:
      db-init:
        condition: service_completed_successfully
    restart: on-failure
    environment:
      DB_URL: "jdbc:sqlserver://arizanet-db:1433;databaseName=${DB_NAME};encrypt=true;trustServerCertificate=true"
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
    ports:
      - "${FAULT_SERVICE_PORT}:8082"

  user-service:
    build:
      context: ./backend/user-service
      dockerfile: Dockerfile
    container_name: arizanet-user-service
    depends_on:
      db-init:
        condition: service_completed_successfully
    restart: on-failure
    environment:
      DB_HOST: arizanet-db
      DB_PORT: 1433
      DB_NAME: ${DB_NAME}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      USER_SERVICE_PORT: 8083
      JWT_SECRET: ${JWT_SECRET}
    ports:
      - "${USER_SERVICE_PORT}:8083"

  solution-tracking-service:
    build:
      context: ./backend/solution-tracking-service
      dockerfile: Dockerfile
    container_name: arizanet-solution-tracking-service
    depends_on:
      db-init:
        condition: service_completed_successfully
    restart: on-failure
    environment:
      DB_HOST: arizanet-db
      DB_PORT: 1433
      DB_NAME: ${DB_NAME}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      SOLUTION_TRACKING_SERVICE_PORT: 8084
      JWT_SECRET: ${JWT_SECRET}
    ports:
      - "${SOLUTION_TRACKING_SERVICE_PORT}:8084"
volumes:
  arizanet_db_data: