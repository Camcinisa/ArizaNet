spring.application.name=auth-service

server.port=8081

spring.datasource.url=jdbc:sqlserver://${AUTH_DB_HOST:localhost}:${AUTH_DB_PORT:1433};databaseName=${AUTH_DB_NAME:ArizaNetDb};encrypt=true;trustServerCertificate=true
spring.datasource.username=${AUTH_DB_USERNAME:sa}
spring.datasource.password=${AUTH_DB_PASSWORD:ArizaNet123!}
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true