spring.application.name=api-gateway
server.port=${API_GATEWAY_PORT:8080}

spring.cloud.gateway.server.webmvc.routes[0].id=auth-service
spring.cloud.gateway.server.webmvc.routes[0].uri=http://${AUTH_SERVICE_HOST:localhost}:${AUTH_SERVICE_PORT:8081}
spring.cloud.gateway.server.webmvc.routes[0].predicates[0]=Path=/api/auth/**

spring.cloud.gateway.server.webmvc.routes[1].id=fault-service
spring.cloud.gateway.server.webmvc.routes[1].uri=http://${FAULT_SERVICE_HOST:localhost}:${FAULT_SERVICE_PORT:8082}
spring.cloud.gateway.server.webmvc.routes[1].predicates[0]=Path=/api/fault-solutions/**

spring.cloud.gateway.server.webmvc.routes[2].id=user-service
spring.cloud.gateway.server.webmvc.routes[2].uri=http://${USER_SERVICE_HOST:localhost}:${USER_SERVICE_PORT:8083}
spring.cloud.gateway.server.webmvc.routes[2].predicates[0]=Path=/api/users/**

spring.cloud.gateway.server.webmvc.routes[3].id=solution-tracking-service
spring.cloud.gateway.server.webmvc.routes[3].uri=http://${SOLUTION_TRACKING_SERVICE_HOST:localhost}:${SOLUTION_TRACKING_SERVICE_PORT:8084}
spring.cloud.gateway.server.webmvc.routes[3].predicates[0]=Path=/api/solution-tracking/**

spring.cloud.gateway.server.webmvc.routes[4].id=report-service
spring.cloud.gateway.server.webmvc.routes[4].uri=http://${REPORT_SERVICE_HOST:localhost}:${REPORT_SERVICE_PORT:8085}
spring.cloud.gateway.server.webmvc.routes[4].predicates[0]=Path=/api/reports/**

spring.cloud.gateway.server.webmvc.routes[5].id=device-service
spring.cloud.gateway.server.webmvc.routes[5].uri=http://${DEVICE_SERVICE_HOST:localhost}:${DEVICE_SERVICE_PORT:8086}
spring.cloud.gateway.server.webmvc.routes[5].predicates[0]=Path=/api/device-models/**