name: arizanet

services:
  arizanet-db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: arizanet-db
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_PID: "Developer"
      MSSQL_SA_PASSWORD: ${DB_PASSWORD}
    ports:
      - "${DB_PORT}:1433"
    volumes:
      - arizanet_db_data:/var/opt/mssql

  auth-service:
    build:
      context: ./backend/auth-service
      dockerfile: Dockerfile
    container_name: arizanet-auth-service
    depends_on:
      - arizanet-db
    environment:
      AUTH_DB_HOST: arizanet-db
      AUTH_DB_PORT: 1433
      AUTH_DB_NAME: ArizaNetDb
      AUTH_DB_USERNAME: sa
      AUTH_DB_PASSWORD: ${DB_PASSWORD}
    ports:
      - "8081:8081"

volumes:
  arizanet_db_data: